name: Atualizar Newsletter ImpulsionAI

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 4' # Toda quinta-feira às 10h UTC (7h Brasília)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests anthropic

      - name: Gerar novo arquivo da Newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_newsletter.py

      - name: Adicionar arquivo para commit
        run: git add newsletter.html

      - name: Commit e Push das alterações
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📰 [Bot] Newsletter atualizada — $(date '+%d/%m/%Y')"

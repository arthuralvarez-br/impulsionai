name: Atualizar Newsletter ImpulsionAI

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 4' # Toda quinta-feira às 7h Brasilia

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests anthropic google-auth google-auth-httplib2 google-api-python-client

      - name: Gerar e enviar Newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python update_newsletter.py

      - name: Commit e Push da newsletter
        run: |
          git config user.name "ImpulsionAI Bot"
          git config user.email "arthuralvarezdesouza@gmail.com"
          git pull --rebase origin main
          git add newsletter.html
          git diff --cached --quiet || git commit -m "Newsletter atualizada e enviada"
          git push origin main
